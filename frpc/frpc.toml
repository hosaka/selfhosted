serverAddr = "{{ .Envs.PROXY_FRP_SERVER_ADDR }}"
serverPort = 7000
auth.token = "{{ .Envs.PROXY_FRP_AUTH_TOKEN }}"

webServer.addr = "0.0.0.0"
webServer.port = 7400

# we have a bunch of UDP proxies and need a bigger connection pool
# the frps side also sets maxPoolCount for clients, this should be less than the max
transport.poolCount = 10

# to allow proxies to get real user IP
# see: https://gofrp.org/en/docs/features/common/realip/
# transport.proxyProtocolVersion = "v2"

[[proxies]]
name = "https"
type = "tcp"
localIP = "caddy"
localPort = 443
remotePort = 443
transport.proxyProtocolVersion = "v2"

[[proxies]]
name = "http"
type = "tcp"
localIP = "caddy"
localPort = 80
remotePort = 80
transport.proxyProtocolVersion = "v2"

[[proxies]]
name = "snikket-xmpp-c2s"
type = "tcp"
localIP = "snikket"
localPort = 5222
remotePort = 5222

[[proxies]]
name = "snikket-xmpp-s2s"
type = "tcp"
localIP = "snikket"
localPort = 5269
remotePort = 5269

[[proxies]]
name = "snikket-proxy65"
type = "tcp"
localIP = "snikket"
localPort = 5000
remotePort = 5000

[[proxies]]
name = "snikket-stun-tcp"
type = "tcp"
localIP = "snikket"
localPort = 3478
remotePort = 3478

[[proxies]]
name = "snikket-stun-udp"
type = "udp"
localIP = "snikket"
localPort = 3478
remotePort = 3478

[[proxies]]
name = "snikket-turn-tcp"
type = "tcp"
localIP = "snikket"
localPort = 3479
remotePort = 3479

[[proxies]]
name = "snikket-turn-udp"
type = "udp"
localIP = "snikket"
localPort = 3479
remotePort = 3479

[[proxies]]
name = "snikket-stuns-tcp"
type = "tcp"
localIP = "snikket"
localPort = 5349
remotePort = 5349

[[proxies]]
name = "snikket-stuns-udp"
type = "udp"
localIP = "snikket"
localPort = 5349
remotePort = 5349

[[proxies]]
name = "snikket-turns-tcp"
type = "tcp"
localIP = "snikket"
localPort = 5350
remotePort = 5350

[[proxies]]
name = "snikket-turns-udp"
type = "udp"
localIP = "snikket"
localPort = 5350
remotePort = 5350

{{- range $_, $v := parseNumberRangePair "60000-60010" "60000-60010" }}
[[proxies]]
name = "snikket-data-{{ $v.First }}"
type = "udp"
localIP = "snikket"
localPort = {{ $v.First }}
remotePort = {{ $v.Second }}
{{- end }}

[[proxies]]
name = "ssh-host"
type = "tcpmux"
multiplexer = "httpconnect"
customDomains = ["ssh.{{ .Envs.PROXY_PUBLIC_DOMAIN }}"]
localIP = "host.docker.internal"
localPort = 22

[[proxies]]
name = "ssh-code"
type = "tcpmux"
multiplexer = "httpconnect"
customDomains = ["git.{{ .Envs.PROXY_PUBLIC_DOMAIN }}"]
localIP = "forgejo"
localPort = 2222
