include:
  - authelia.yml
  - atuin.yml
  - forgejo.yml
  # - frigate.yml
  - gotify.yml
  # - homeassistant.yml
  - immich.yml
  - jellyfin.yml
  - kavita.yml
  - metrics.yml
  - navidrome.yml
  - paperless.yml
  - qbittorrent.yml
  - sabnzbd.yml
  - searxng.yml
  - servarr.yml
  # - syncstorage.yml
  - slskd.yml
  - vaultwarden.yml
  - voidrepo.yml
  - wakapi.yml

networks:
  frp:
  proxy:
  monitor:

volumes:
  caddy-config:

services:
  caddy:
    image: ghcr.io/hotio/caddy:release-2.11.2
    environment:
      - PROXY_CF_API_EMAIL=${PROXY_CF_API_EMAIL}
      - PROXY_CF_API_TOKEN=${PROXY_CF_API_TOKEN}
      - PROXY_PUBLIC_DOMAIN=${PROXY_PUBLIC_DOMAIN}
      - PROXY_PRIVATE_DOMAIN=${PROXY_PRIVATE_DOMAIN}
    extends:
      file: common.yml
      service: hotio
    networks:
      - proxy
      - frp
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - caddy-config:/config
      - ./caddy/Caddyfile:/config/Caddyfile
      - ${FILES_SWITCH_PATH}:/srv/switch
      - ${FILES_VOIDREPO_PATH}:/srv/voidrepo

  frpc:
    image: ghcr.io/fatedier/frpc:v0.67.0
    command: --config /etc/frp/frpc.toml
    environment:
      - PROXY_FRP_SERVER_ADDR=${PROXY_FRP_SERVER_ADDR}
      - PROXY_FRP_AUTH_TOKEN=${PROXY_FRP_AUTH_TOKEN}
      - PROXY_PUBLIC_DOMAIN=${PROXY_PUBLIC_DOMAIN}
    extra_hosts:
      - host.docker.internal:host-gateway
    expose:
      - 7400 # webui
    extends:
      file: common.yml
      service: log-to-json
    hostname: box.${PROXY_PUBLIC_DOMAIN}
    networks:
      - frp
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./frpc/frpc.toml:/etc/frp/frpc.toml:ro

  whoami:
    image: ghcr.io/traefik/whoami:v1.11.0
    expose:
      - 80 # http
    extends:
      file: common.yml
      service: log-to-json
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
