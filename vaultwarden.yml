networks:
  proxy:

volumes:
  vaultwarden-data:

services:
  vaultwarden:
    image: ghcr.io/dani-garcia/vaultwarden:1.35.7-alpine
    environment:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
      - DOMAIN=https://vaultwarden.${PROXY_PUBLIC_DOMAIN}
      - INVITATIONS_ALLOWED=false
      - ORG_CREATION_USERS=none
      - PASSWORD_HINTS_ALLOWED=false
      - SHOW_PASSWORD_HINT=false
      - SIGNUPS_ALLOWED=false
      - SMTP_FROM=${VAULTWARDEN_SMTP_FROM}
      - SMTP_HOST=${VAULTWARDEN_SMTP_HOST}
      - SMTP_PASSWORD=${VAULTWARDEN_SMTP_PASSWORD}
      - SMTP_PORT=${VAULTWARDEN_SMTP_PORT}
      - SMTP_SECURITY=${VAULTWARDEN_SMTP_SECURITY}
      - SMTP_USERNAME=${VAULTWARDEN_SMTP_USERNAME}
      - SSO_ENABLED=true
      - SSO_ONLY=false
      # on SSO signup associate a user with a matching email that already exists
      - SSO_SIGNUPS_MATCH_EMAIL=true
      - SSO_AUTHORITY=https://auth.${PROXY_PUBLIC_DOMAIN}
      # openid scope is implicit and does not need to be included here
      - SSO_SCOPES=email profile offline_access vaultwarden
      - SSO_PKCE=true
      - SSO_CLIENT_ID=${AUTH_VAULTWARDEN_CLIENT_ID}
      - SSO_CLIENT_SECRET=${AUTH_VAULTWARDEN_CLIENT_SECRET}
      - TZ=${TIMEZONE}
      - YUBICO_CLIENT_ID=${VAULTWARDEN_YUBICO_CLIENT_ID}
      - YUBICO_SECRET_KEY=${VAULTWARDEN_YUBICO_SECRET_KEY}
    expose:
      - 80 # webui
      - 3012 # websocket
    extends:
      file: common.yml
      service: log-to-json
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - vaultwarden-data:/data
