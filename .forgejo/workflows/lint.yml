name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  lint:
    name: Lint
    runs-on: docker

    steps:
      - uses: https://code.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: https://github.com/jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Run prek checks
        run: |
          prek \
            --from-ref ${{ github.event.pull_request.base.sha || github.event.before }} \
            --to-ref ${{ github.event.pull_request.head.sha || github.event.after }}
