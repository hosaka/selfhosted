- name: update package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 43200 # 12 hours

- name: ensure ufw is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: ensure fail2ban is installed
  ansible.builtin.apt:
    name: fail2ban
    state: present
