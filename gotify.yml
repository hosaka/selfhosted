networks:
  # todo: maybe a separate notify network is better than re-using monitor
  monitor:
  proxy:

volumes:
  diun-data:
  gotify-data:

services:
  gotify:
    image: ghcr.io/gotify/server:master
    environment:
      - TZ=${TIMEZONE}
      - GOTIFY_OIDC_ENABLED=true
      - GOTIFY_OIDC_ISSUER=https://auth.${PROXY_PUBLIC_DOMAIN}
      - GOTIFY_OIDC_CLIENTID=${AUTH_GOTIFY_CLIENT_ID}
      - GOTIFY_OIDC_CLIENTSECRET=${AUTH_GOTIFY_CLIENT_SECRET}
      - GOTIFY_OIDC_REDIRECTURL=https://gotify.${PROXY_PUBLIC_DOMAIN}/auth/oidc/callback
      - GOTIFY_OIDC_AUTOREGISTER=true
      - GOTIFY_OIDC_USERNAMECLAIM=preferred_username
    expose:
      - 80 # webui
    extends:
      file: common.yml
      service: log-to-json
    networks:
      - proxy
      - monitor
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - gotify-data:/app/data

  diun:
    image: ghcr.io/crazy-max/diun:4.31
    command: serve
    environment:
      - TZ=${TIMEZONE}
      - DIUN_NOTIF_GOTIFY_ENDPOINT=http://gotify
      - DIUN_NOTIF_GOTIFY_TOKEN=${MONITOR_DIUN_GOTIFY_TOKEN}
      - DIUN_WATCH_WORKERS=10
      - DIUN_WATCH_SCHEDULE=0 */6 * * *
      - DIUN_REGOPTS_0_NAME=docker.io
      - DIUN_REGOPTS_0_SELECTOR=image
      - DIUN_REGOPTS_0_USERNAME=${MONITOR_DIUN_DOCKERHUB_USERNAME}
      - DIUN_REGOPTS_0_PASSWORD=${MONITOR_DIUN_DOCKERHUB_PASSWORD}
      - DIUN_REGOPTS_1_NAME=ghcr.io
      - DIUN_REGOPTS_1_SELECTOR=image
      - DIUN_REGOPTS_1_USERNAME=${MONITOR_DIUN_GHCR_USERNAME}
      - DIUN_REGOPTS_1_PASSWORD=${MONITOR_DIUN_GHCR_PASSWORD}
      - DIUN_PROVIDERS_FILE_FILENAME=/config.yml
    extends:
      file: common.yml
      service: log-to-json
    networks:
      - monitor
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - diun-data:/data
      - ./diun/config.yml:/config.yml:ro
